<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You!</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="/public/css/styles.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e0f2fe; /* Light blue background */
        }
        .thank-you-card {
            background-color: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 3rem;
            text-align: center;
            max-width: 600px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon-check {
            color: #10b981; /* Tailwind green-500 */
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }
        .button-primary {
            background-color: #3b82f6; /* Tailwind blue-500 */
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        .button-primary:hover {
            background-color: #2563eb; /* Tailwind blue-600 */
        }
    </style>
</head>
<body>
    <div class="thank-you-card">
        <div class="icon-check">✔</div>
        <h1 class="text-4xl font-extrabold text-gray-900 mb-4">Thank You!</h1>
        <p class="text-lg text-gray-700 mb-6">
            You have successfully left the waiting queue.
        </p>
        <p class="text-md text-gray-600 mb-8">
            We appreciate your patience. You can return to our main page if you wish.
        </p>
        <a href="/" class="button-primary no-underline">Go to Main Page</a>
    </div>
</body>
</html>
